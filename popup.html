<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <h1 id="app-title" data-i18n="appTitle">To-Do List</h1>
            </div>
            <div class="header-actions">
                <button type="button" class="btn btn-ghost btn-sm" id="btn-calendar" title="Calendar"
                    data-i18n="calendar">📅 Calendar</button>
                <button type="button" class="btn btn-ghost btn-sm" id="btn-settings" title="Settings"
                    data-i18n-title="settings">⚙️</button>
            </div>
        </header>

        <div id="main-view">
            <section class="panel summary-panel" id="summary-panel">
                <div class="summary-donut" id="summary-donut">
                    <svg viewBox="0 0 36 36">
                        <circle class="ring-bg" cx="18" cy="18" r="15.9" fill="none" stroke-width="3" />
                        <circle class="ring-fill" id="donut-fill" cx="18" cy="18" r="15.9" fill="none" stroke-width="3"
                            stroke-dasharray="100 100" stroke-dashoffset="0" />
                    </svg>
                </div>
                <div class="summary-content">
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
                    </div>
                    <div class="summary-stats" id="summary-stats"></div>
                    <div class="summary-stats-extra" id="summary-stats-extra"
                        style="font-size: 0.8rem; margin-top: 0.2rem; opacity: 0.8;"></div>
                    <div class="bars-chart" id="bars-chart"></div>
                </div>
            </section>

            <section class="folders-section panel">
                <div class="folders-title" id="folders-title" data-i18n="folders">Dossiers</div>
                <div class="folders-list" id="folders-list"></div>
                <div class="add-folder-form" id="add-folder-form" style="display: none;">
                    <input type="text" id="new-folder-name" maxlength="30" />
                    <button type="button" class="btn btn-primary" id="add-folder-confirm"
                        data-i18n="create">Créer</button>
                    <button type="button" class="btn btn-ghost" id="add-folder-cancel"
                        data-i18n="cancel">Annuler</button>
                </div>
                <button type="button" class="add-folder-inline" id="add-folder-btn" data-i18n="newFolder">+ Nouveau
                    dossier</button>
            </section>

            <section class="panel">
                <form class="form-row" id="task-form">
                    <input type="text" id="task-input" autocomplete="off" required />
                    <select id="task-folder">
                        <option value="" data-i18n="noFolder">Sans dossier</option>
                    </select>
                    <select id="task-priority">
                        <option value="none" data-i18n="priorityNone" style="color:var(--text-secondary)">Aucune
                            priorité
                        </option>
                        <option value="critical" data-i18n="priorityCritical" style="color:var(--danger)">Critique
                        </option>
                        <option value="high" data-i18n="priorityHigh" style="color:#f97316">Haute</option>
                        <option value="medium" data-i18n="priorityMedium" style="color:#eab308">Moyenne</option>
                        <option value="normal" data-i18n="priorityNormal" style="color:#3b82f6">Normale</option>
                        <option value="low" data-i18n="priorityLow" style="color:#22c55e">Basse</option>

                    </select>
                    <input type="date" id="task-due" class="input-date" />
                    <button type="submit" class="btn btn-primary" id="task-submit-btn" data-i18n="add">Ajouter</button>
                </form>
                <div class="toolbar">
                    <button type="button" class="btn btn-danger-ghost" id="clear-done-btn" data-i18n="clearDone">Effacer
                        les
                        tâches terminées</button>
                    <button type="button" class="btn btn-danger-ghost" id="empty-trash-btn" data-i18n="emptyTrash"
                        style="display: none;">Vider la corbeille</button>
                </div>
            </section>

            <div class="search-wrap">
                <span class="search-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="search-input" autocomplete="off" />
            </div>

            <div class="filters-sort">
                <div class="filter-tabs">
                    <button type="button" class="btn btn-ghost filter-btn active" data-filter="all"
                        data-i18n="filterAll">Toutes</button>
                    <button type="button" class="btn btn-ghost filter-btn" data-filter="active"
                        data-i18n="filterActive">En
                        cours</button>
                    <button type="button" class="btn btn-ghost filter-btn" data-filter="done"
                        data-i18n="filterDone">Terminées</button>
                    <button type="button" class="btn btn-ghost filter-btn" data-filter="trash"
                        data-i18n="filterTrash">Corbeille</button>
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="newest" data-i18n="sortNewest">Plus récentes</option>
                    <option value="oldest" data-i18n="sortOldest">Plus anciennes</option>
                    <option value="priority" data-i18n="sortPriority">Priorité</option>
                    <option value="due-date" data-i18n="sortDue">Date d'échéance (Proche → Loin)</option>
                    <option value="due-date-desc" data-i18n="sortDueDesc">Date d'échéance (Loin → Proche)</option>
                    <option value="alpha" data-i18n="sortAlpha">A → Z</option>
                    <option value="alpha-desc" data-i18n="sortAlphaDesc">Z → A</option>
                    <option value="folder-alpha" data-i18n="sortFolderAlpha">Dossier (A → Z)</option>
                    <option value="folder-alpha-desc" data-i18n="sortFolderAlphaDesc">Dossier (Z → A)</option>
                    <option value="order" data-i18n="sortOrder">Ordre personnalisé</option>
                </select>
            </div>

            <ul class="task-list" id="task-list"></ul>
        </div> <!-- End of main-view -->

        <div id="calendar-view" style="display: none;">
            <div class="calendar-header">
                <button type="button" class="btn btn-ghost" id="calendar-prev">&lt;</button>
                <h2 id="calendar-month-year"></h2>
                <button type="button" class="btn btn-ghost" id="calendar-next">&gt;</button>
                <button type="button" class="btn btn-ghost" id="calendar-today" data-i18n="today">Aujourd'hui</button>
            </div>
            <div class="calendar-grid">
                <div class="calendar-day-name" data-i18n="dayMon">Lun</div>
                <div class="calendar-day-name" data-i18n="dayTue">Mar</div>
                <div class="calendar-day-name" data-i18n="dayWed">Mer</div>
                <div class="calendar-day-name" data-i18n="dayThu">Jeu</div>
                <div class="calendar-day-name" data-i18n="dayFri">Ven</div>
                <div class="calendar-day-name" data-i18n="daySat">Sam</div>
                <div class="calendar-day-name" data-i18n="daySun">Dim</div>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
        </div>

        <div id="settings-view" style="display: none; padding: 1rem;">
            <div class="calendar-header" style="margin-bottom: 20px;">
                <button type="button" class="btn btn-ghost" id="settings-back">&lt;</button>
                <h2 data-i18n="settings">Réglages</h2>
                <div style="width: 32px;"></div> <!-- spacer -->
            </div>

            <div class="settings-group">
                <label data-i18n="language" class="settings-label">Langue</label>
                <select id="lang-select" class="lang-select" title="Langue"
                    style="width: 100%; border: 1px solid var(--border); padding: 0.5rem; background: var(--bg-secondary); color: var(--text-primary); border-radius: 4px;">
                    <option value="fr">Français (FR)</option>
                    <option value="en">English (EN)</option>
                </select>
            </div>

            <div class="settings-group" style="margin-top: 20px;">
                <label data-i18n="theme" class="settings-label">Thème</label>
                <button type="button" class="btn btn-ghost" id="theme-toggle" data-i18n-title="titleTheme"
                    style="width: 100%; display: flex; justify-content: center; gap: 8px; border: 1px solid var(--border);">
                    <span id="theme-icon-sun" style="display: none;">☀️ <span data-i18n="themeLight">Mode
                            Clair</span></span>
                    <span id="theme-icon-moon">🌙 <span data-i18n="themeDark">Mode Sombre</span></span>
                </button>
            </div>

            <div class="settings-group" style="margin-top: 20px;">
                <label data-i18n="data" class="settings-label">Données</label>
                <div style="display:flex; gap:10px; width: 100%;">
                    <button type="button" class="btn btn-ghost" id="btn-export" title="Export JSON"
                        data-i18n="exportData" style="flex: 1; border: 1px solid var(--border);">Export</button>
                    <button type="button" class="btn btn-ghost" id="btn-import" title="Import JSON"
                        data-i18n="importData" style="flex: 1; border: 1px solid var(--border);">Import</button>
                    <input type="file" id="import-file" accept=".json" style="display: none;" />
                </div>
            </div>

            <div class="settings-footer"
                style="margin-top: 40px; font-size: 0.85rem; color: var(--text-secondary); text-align: center;">
                <p>Version <span id="app-version">1.2.2</span></p>
                <p style="margin-top: 10px;">
                    <a href="https://mathis-bernarde-portfolio.onrender.com" target="_blank"
                        style="color: var(--accent); text-decoration: none;" data-i18n="contactMe">Contact Me</a>
                </p>
                <p style="margin-top: 10px;">
                    <a href="https://www.buymeacoffee.com/Mathis_Berenarde" target="_blank"
                        style="color: #FFDD00; text-decoration: none; font-weight: bold;">☕ Buy me a coffee</a>
                </p>
            </div>
        </div>
    </div>

    <script src="libs/fuse.js"></script>
    <script src="popup.js"></script>
</body>

</html>
